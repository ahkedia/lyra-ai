version: '3.8'

services:
  # Evolution API - WhatsApp bridge
  # SECURITY: Bound to localhost only — not exposed to internet
  evolution-api:
    image: atserver/evolution-api:latest
    container_name: evolution-whatsapp
    restart: always
    environment:
      - EVOLUTION_INSTANCE_NAME=lyra-whatsapp
      - EVOLUTION_INSTANCE_QRCODE=true
    ports:
      - "127.0.0.1:9000:9000"
    volumes:
      - evolution-data:/home/evolution/instances
    networks:
      - lyra-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # OpenClaw Agent - Main agent
  openclaw-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-lyra
    restart: always
    environment:
      # LLM Configuration
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - OPENCLAW_MODEL=minimax/minimax-m2-5

      # Agent Configuration
      - OPENCLAW_WORKSPACE=/home/openclaw/workspace
      - OPENCLAW_GATEWAY_PORT=18789
      - OPENCLAW_GATEWAY_BIND=0.0.0.0

      # Channel Configuration
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_USER_ID=${TELEGRAM_USER_ID}
      - TELEGRAM_PARTNER_ID=${TELEGRAM_PARTNER_ID}

      # WhatsApp Configuration
      - WHATSAPP_USER_PHONE=${WHATSAPP_USER_PHONE}
      - EVOLUTION_API_URL=http://evolution-api:9000

      # Notion Configuration
      - NOTION_API_KEY=${NOTION_API_KEY}

      # Other integrations
      - TAVILY_API_KEY=${TAVILY_API_KEY}

      # Node environment
      - NODE_ENV=production
    ports:
      - "18789:18789"
    volumes:
      - openclaw-workspace:/home/openclaw/workspace
      - ./config:/home/openclaw/config
      - ./skills:/home/openclaw/skills
      - ./notion:/home/openclaw/notion
    networks:
      - lyra-network
    depends_on:
      evolution-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: PostgreSQL for future session persistence
  # SECURITY: Bound to localhost only — never expose to internet
  postgres:
    image: postgres:15-alpine
    container_name: lyra-postgres
    restart: always
    environment:
      - POSTGRES_DB=lyra_agent
      - POSTGRES_USER=openclaw
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - lyra-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openclaw"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  evolution-data:
  openclaw-workspace:
  postgres-data:

networks:
  lyra-network:
    driver: bridge
