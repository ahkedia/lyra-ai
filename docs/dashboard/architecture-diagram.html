/* ─── Reusable Card ─── */
function Card({ x, y, w, h, children, glow, style = {} }) {
  const glowColor = glow || 'transparent';
  return (
    <foreignObject x={x} y={y} width={w} height={h}>
      <div xmlns="http://www.w3.org/1999/xhtml" style={{
        width: '100%', height: '100%',
        background: C.card,
        border: `1px solid ${C.cardBorder}`,
        borderRadius: 12,
        padding: '14px 16px',
        boxShadow: glow ? `0 0 20px ${glowColor}15, 0 0 40px ${glowColor}08` : 'none',
        backdropFilter: 'blur(8px)',
        ...style,
      }}>
        {children}
      </div>
    </foreignObject>
  );
}

/* ─── Label helpers ─── */

/* ─── Arrow path builder ─── */
function Arrow({ from, to, color = 'rgba(255,255,255,0.12)', dashed = false, label, labelOffset }) {
  const [fx, fy] = from;
  const [tx, ty] = to;
  const mx = (fx + tx) / 2;
  const my = (fy + ty) / 2;
  // Determine curvature
  const dx = tx - fx;
  const dy = ty - fy;
  let path;
  if (Math.abs(dy) < 10) {
    // Horizontal
    path = `M${fx},${fy} C${fx + dx * 0.4},${fy} ${tx - dx * 0.4},${ty} ${tx},${ty}`;
  } else if (Math.abs(dx) < 10) {
    // Vertical
    path = `M${fx},${fy} C${fx},${fy + dy * 0.4} ${tx},${ty - dy * 0.4} ${tx},${ty}`;
  } else {
    path = `M${fx},${fy} C${fx + dx * 0.5},${fy} ${tx - dx * 0.5},${ty} ${tx},${ty}`;
  }
  return (
    <g>
      <path d={path} fill="none" stroke={color} strokeWidth={1.5}
        strokeDasharray={dashed ? '4,4' : 'none'} opacity={0.7} />
      <circle cx={tx} cy={ty} r={2.5} fill={color} opacity={0.9} />
      {label && (
        <text x={mx + (labelOffset?.[0] || 0)} y={my + (labelOffset?.[1] || 0)}
          fill={C.textDim} fontSize={9} textAnchor="middle" fontFamily="Inter, sans-serif">
          {label}
        </text>
      )}
    </g>
  );
}
