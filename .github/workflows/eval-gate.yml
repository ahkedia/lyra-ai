name: Eval Coverage Gate

# Phase 4 of "evals before changes": ENFORCED. A PR that changes Lyra's behavior
# without touching an eval case fails this check. Escape hatch: include
# "[break-glass: <reason>]" in a commit message (logged + flagged, not silent).
# Shadow phase history: 2026-05 → 2026-07 warn-only, decisions in evals/gate/logs/.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  eval-coverage:
    name: Eval coverage (enforced)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # need the base commit to diff against

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Resolve diff range
        id: range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            BASE="${{ github.event.before }}"
            # first push / unknown parent -> fall back to HEAD^
            if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              BASE="$(git rev-parse HEAD^ 2>/dev/null || git rev-parse HEAD)"
            fi
            echo "base=$BASE" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run eval-coverage gate (enforced)
        run: |
          set -o pipefail
          node evals/gate/check-eval-coverage.js \
            --enforce \
            --base "${{ steps.range.outputs.base }}" \
            --head "${{ steps.range.outputs.head }}" \
            --log /tmp/shadow-decisions.jsonl | tee /tmp/gate-output.txt
          {
            echo '## Eval Coverage Gate (enforced)'
            echo ''
            echo '```'
            cat /tmp/gate-output.txt
            echo '```'
            echo ''
            echo '_An uncovered behavior change blocks the build — add a case in `evals/cases/` or tag the commit `[break-glass: <reason>]`._'
          } >> "$GITHUB_STEP_SUMMARY"
