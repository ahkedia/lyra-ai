# systemd drop-in for openclaw.service — install on Hetzner:
#   sudo cp /root/lyra-ai/scripts/openclaw-memory-limit.conf /etc/systemd/system/openclaw.service.d/memory-limit.conf
#   sudo systemctl daemon-reload && sudo systemctl restart openclaw
#
# 4GB VPS: leave ~2GB for OS, eval runner, DB, etc.
# MemoryHigh: soft throttle before MemoryMax hard cap.

[Service]
MemoryMax=1536M
MemoryHigh=1200M
