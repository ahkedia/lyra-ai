# Tier 5: Production Gap Tests
# Added 2026-03-29 to cover identified gaps: conversation continuity,
# Tier 0 CRUD paths, Abhigna positive flows, digest quality, write verification.

tests:
  # --- Conversation Continuity ---
  - id: conv-correction-time
    tier: gap
    category: conversation
    name: "Amend reminder time in follow-up"
    timeout_ms: 45000
    side_effects: write
    multi_turn: true
    turns:
      - role: user
        message: "Add a reminder: [tc] dentist appointment tomorrow at 2pm"
      - role: user
        message: "Actually change that to 4pm"
    validators:
      - type: llm_judge
        rubric: "Does the response acknowledge the time change to 4pm? It should confirm the reminder has been updated or ask to confirm the update. Simply asking what reminder without context is a FAIL (no conversation continuity)."
    cleanup:
      action: notion_delete_matching
      database: "95e1d0de-496f-478e-9fe4-2e2a356c7970"
      title_contains: "dentist appointment"
    tags: [conversation, multi-turn, reminder]

  - id: conv-context-reference
    tier: gap
    category: conversation
    name: "Reference earlier context"
    timeout_ms: 45000
    side_effects: none
    multi_turn: true
    turns:
      - role: user
        message: "My sister's name is Priya"
      - role: user
        message: "What's my sister's name?"
    validators:
      - type: contains
        value: "Priya"
      - type: llm_judge
        rubric: "Does the response correctly recall the sister's name (Priya) from earlier in the conversation? A correct answer scores 5. Asking 'which sister?' or not knowing scores low."
    tags: [conversation, context, multi-turn]

  # --- Tier 0 CRUD Paths ---
  - id: tier0-mark-done
    eval_lane: diagnostic
    tier: gap
    category: crud
    name: "Mark item done"
    prompt: "What are my current reminders? Just list them briefly."
    timeout_ms: 45000
    side_effects: read_only
    validators:
      - type: llm_judge
        rubric: "Does the response list reminders from Notion? It should query the Reminders database and return actual items (even if empty). A hallucinated list scores 1. Querying and returning results (or confirming empty) scores 5."
      - type: latency_p95
        threshold_ms: 45000
    tags: [crud, tier0, read]

  - id: tier0-shopping-list-add
    eval_lane: diagnostic
    tier: gap
    category: crud
    name: "Add to shopping list"
    prompt: "Add [tc] apples to my shopping list"
    timeout_ms: 45000
    side_effects: write
    validators:
      - type: llm_judge
        rubric: "Does the response confirm adding apples to the shopping list in Notion? It should mention the Shopping List database. Latency under 8s is expected for Tier 0."
      - type: latency_p95
        threshold_ms: 45000
    cleanup:
      action: notion_delete_matching
      database: "2054e39c-3f09-431d-8821-0e6a7513913a"
      title_contains: "apples"
    tags: [crud, tier0, shopping]

  # --- Abhigna Positive Flows ---
  - id: abhigna-shopping-add
    non_blocking: true  # unused feature (multi-user/calendar) — informational, not gating
    eval_lane: diagnostic
    tier: gap
    category: access_control
    name: "Abhigna can add to shopping list"
    prompt: "I'm Abhigna. Add [tc] yogurt to the shopping list."
    timeout_ms: 45000
    side_effects: write
    validators:
      - type: llm_judge
        rubric: "Does the response confirm adding yogurt to the shopping list? Abhigna has access to the Shopping List. The response should complete the action, not refuse. Refusing is a FAIL."
    cleanup:
      action: notion_delete_matching
      database: "2054e39c-3f09-431d-8821-0e6a7513913a"
      title_contains: "yogurt"
    tags: [access-control, abhigna, shopping]

  - id: abhigna-meal-check
    non_blocking: true  # unused feature (multi-user/calendar) — informational, not gating
    eval_lane: diagnostic
    tier: gap
    category: access_control
    name: "Abhigna can check meals"
    prompt: "I'm Abhigna. What's planned for dinner this week?"
    timeout_ms: 60000
    side_effects: read_only
    validators:
      - type: llm_judge
        rubric: "Does the response attempt to help Abhigna with meal planning? It should query the Meal Planning database or provide relevant info. Refusing to help is a FAIL. Querying and returning data (or saying nothing planned) is a PASS."
    tags: [access-control, abhigna, meals]

  - id: abhigna-trips-check
    non_blocking: true  # unused feature (multi-user/calendar) — informational, not gating
    tier: gap
    category: access_control
    name: "Abhigna can check trips"
    prompt: "I'm Abhigna. Do we have any trips coming up?"
    timeout_ms: 60000
    side_effects: read_only
    validators:
      - type: llm_judge
        rubric: "Does the response attempt to check the Upcoming Trips database for Abhigna? She has read access to trips. The response should query and return results (or confirm empty). Refusing is a FAIL."
    tags: [access-control, abhigna, trips]

  # --- Digest Quality ---
  - id: digest-section-completeness
    tier: gap
    category: digest
    name: "Digest has expected sections"
    prompt: "Quick digest: give me today's date, my top 3 priorities from Notion, and any reminders due today. Be concise."
    timeout_ms: 90000
    side_effects: read_only
    validators:
      - type: regex
        pattern: "(priority|reminder|task|due|today)"
        flags: "i"
      - type: llm_judge
        rubric: "Does the response include: (1) today's date or time reference, (2) priorities or tasks from Notion, (3) mention of reminders? All 3 sections present = 5/5. Missing one section = 3/5. Only date present = 1/5."
    tags: [digest, completeness]

  - id: digest-graceful-partial
    tier: gap
    category: digest
    name: "Digest degrades gracefully on partial failure"
    prompt: "Generate a brief morning summary. If any data source is unavailable, just note it and continue with what you have."
    timeout_ms: 45000
    side_effects: read_only
    validators:
      - type: llm_judge
        rubric: "Does the response deliver a useful summary even if some data is unavailable? A good response attempts to gather all data, delivers what it can, and clearly notes any gaps. Simply saying 'I cannot access X' without delivering anything else is a FAIL. Partial but useful output is a PASS."
    tags: [digest, degradation]

  # --- Write Verification ---
  - id: write-verify-reminder
    tier: gap
    category: write_verification
    name: "Verify reminder was actually written"
    timeout_ms: 45000
    side_effects: write
    multi_turn: true
    turns:
      - role: user
        message: "Add a reminder: [tc] water the plants on Sunday"
      - role: user
        message: "Can you confirm my reminder about watering the plants was saved? Check Notion."
    validators:
      - type: llm_judge
        rubric: "Does the response confirm the reminder exists in Notion by querying it? It should read back from Notion and confirm 'water the plants' is there. Just saying 'yes I added it' without querying Notion scores 2. Querying and confirming scores 5."
    cleanup:
      action: notion_delete_matching
      database: "95e1d0de-496f-478e-9fe4-2e2a356c7970"
      title_contains: "water the plants"
    tags: [write-verification, reminder, multi-turn]

  # --- Job Application Pipeline (Phase A) — added 2026-07-05 for §5.2 ---
  # Phase B (Gmail draft + Recruiter Tracker write) tests require a dry-run
  # flag in crud/job_application.py — see EVAL-TODOS.md for the follow-up.
  # These 4 cases cover the highest-value Phase A behaviors:
  #   • correct routing on a valid trigger
  #   • refusal to fabricate on missing/invalid input
  #   • artifact-menu shape (proves the voice-canon fix is wired)

  - id: job-app-phase-a-trigger
    eval_lane: diagnostic
    tier: gap
    category: job-app
    name: "Phase A: valid job trigger returns clarification"
    prompt: "[tc-eval] apply to Senior Product Manager role at Vercel, link: https://example.com/jobs/pm-vercel-eval"
    timeout_ms: 45000
    side_effects: read_only
    validators:
      - type: llm_judge
        rubric: "Does the response acknowledge the job trigger and ask a clarifying question about which artifact to draft (cover letter, LinkedIn reachout, resume tweaks) BEFORE generating anything? Correctly asking for clarification scores 5. Silently fabricating an application or missing the trigger routing scores 1. Errors score 1."
    tags: [job-app, phase-a, routing]

  - id: job-app-phase-a-missing-url
    eval_lane: diagnostic
    tier: gap
    category: job-app
    name: "Phase A: refuses to fabricate when URL is missing"
    prompt: "[tc-eval] apply to Google"
    timeout_ms: 45000
    side_effects: read_only
    validators:
      - type: llm_judge
        rubric: "Does the response ask for a job URL / link / posting details rather than fabricating a cover letter or reachout? Requesting the missing input scores 5. Silently drafting an application with hallucinated role details scores 1. A generic career-advice response also scores low (fails to route to the job pipeline)."
    tags: [job-app, phase-a, refusal]

  - id: job-app-phase-a-invalid-url
    eval_lane: diagnostic
    tier: gap
    category: job-app
    name: "Phase A: graceful handling of malformed URL"
    prompt: "[tc-eval] job link: not-a-real-url applying as staff engineer"
    timeout_ms: 45000
    side_effects: read_only
    validators:
      - type: llm_judge
        rubric: "Does the response gracefully handle the malformed link — either asking for a valid URL, or proceeding with only the role/context provided? A crash, stack trace, or fabricated URL scores 1. Graceful clarification or context-only continuation scores 5."
    tags: [job-app, phase-a, error-handling]

  - id: job-app-phase-a-artifact-menu
    eval_lane: diagnostic
    tier: gap
    category: job-app
    name: "Phase A: response offers artifact menu (voice canon wired)"
    prompt: "[tc-eval] applying to https://example.com/jobs/staff-eng-stripe-eval as staff engineer with 8 years payments experience"
    timeout_ms: 45000
    side_effects: read_only
    validators:
      - type: llm_judge
        rubric: "Does the response offer AT LEAST TWO of: cover letter, LinkedIn reachout, resume tweaks / edits — as the artifacts it can produce? Offering the artifact menu proves Phase A is correctly triggered AND the voice-canon-wired job_application.py path is being invoked (per commit 3ab9068). Offering 2+ artifacts scores 5. Offering only 1 or a generic response scores 2. No artifact menu at all scores 1."
    tags: [job-app, phase-a, voice-canon-plumbing]
