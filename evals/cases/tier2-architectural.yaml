# Tier 2: Architectural Tests
# These show system-level quality: latency, tool use, model routing.

tests:
  # --- Latency Profiling ---
  - id: latency-simple-greeting
    tier: architectural
    category: latency
    name: "Simple greeting latency"
    prompt: "Hi"
    timeout_ms: 20000
    side_effects: none
    skip_dry_run_prefix: true   # pure conversational, no write intent
    validators:
      - type: latency_p95
        threshold_ms: 15000      # was 8000 — below ~10s is user-indistinguishable; 15s guards regressions
      - type: length_range
        min: 2
    tags: [latency, quick]

  - id: latency-notion-lookup
    tier: architectural
    category: latency
    name: "Notion query latency"
    prompt: "Do I have any upcoming trips?"
    timeout_ms: 45000
    side_effects: read_only
    validators:
      - type: latency_p95
        threshold_ms: 45000
    tags: [latency, notion]

  # --- Tool Use Reliability ---
  - id: tool-reminder-dryrun
    tier: architectural
    category: tool_use
    name: "Notion reminder creation (verified write)"
    prompt: "Add a reminder: [tc] check eval framework results"
    timeout_ms: 60000
    side_effects: write
    validators:
      - type: llm_judge
        rubric: "Does the response confirm a real reminder write to Notion (not a plan)? It should mention the reminder text and indicate completion. If write fails, the response should clearly report failure instead of pretending success."
    cleanup:
      action: notion_delete_matching
      database: "32678008-9100-802f-ad9f-fb48ff5f4c1d"
      data_source: "32678008-9100-8171-8940-000b30243ddd"
      title_contains: "check eval framework"
      title_properties: ["Task"]
    tags: [notion, tool-use, write]

  - id: tool-cron-list
    skip_dry_run_prefix: true  # read-only, no write intent
    tier: architectural
    category: tool_use
    name: "List cron jobs correctly"
    prompt: "List all my scheduled cron jobs with their times"
    timeout_ms: 45000
    side_effects: none
    validators:
      - type: llm_judge
        rubric: "Does the response list scheduled jobs with their names and times? It should return at least one job entry. The response does not need to contain any specific job name — cron configurations change over time. If no openclaw crons are active it may say so and describe system jobs — acceptable (score 3). No attempt at all scores 1."
    tags: [cron, tool-use]

  - id: tool-email-draft
    tier: architectural
    category: tool_use
    name: "Draft email without sending"
    prompt: "Draft an email to test@example.com saying thank you for the meeting. Show me the draft but don't send it."
    timeout_ms: 60000
    side_effects: none
    validators:
      - type: llm_judge
        rubric: "Does the response show a draft email with a subject line and body? It should NOT send the email, but present it for review. The tone should be professional and the content should mention 'thank you' and 'meeting'."
    tags: [email, tool-use, dry-run]

  - id: tool-cross-user-dryrun
    eval_lane: diagnostic
    tier: architectural
    category: tool_use
    name: "Cross-user task handoff (write-backed)"
    prompt: "Tell Abhigna to check the meal plan for next week, and add a shared reminder titled [tc] meal plan follow-up."
    timeout_ms: 45000
    side_effects: write
    validators:
      - type: llm_judge
        rubric: "Does the response complete a real cross-user handoff? It should (1) mention notifying Abhigna and (2) confirm creating the shared [tc] reminder in Notion. A theoretical plan without completion is a FAIL."
    cleanup:
      action: notion_delete_matching
      database: "2054e39c-3f09-431d-8821-0e6a7513913a"
      data_source: "9f206d71-7b25-408b-ad20-02daf0b43da0"
      title_contains: "meal plan follow-up"
      title_properties: ["Task"]
    tags: [cross-user, telegram, write]

  # --- Model Routing ---
  - id: routing-simple-minimax
    tier: architectural
    category: model_routing
    name: "Simple task stays on default model"
    prompt: "What day of the week is it today?"
    timeout_ms: 45000
    side_effects: none
    skip_dry_run_prefix: true   # factual Q, no write intent
    validators:
      - type: regex
        pattern: "(Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday)"
      - type: latency_p95
        threshold_ms: 15000      # was 6000 — conversational Qs below 10s are indistinguishable
    tags: [routing, simple]

  - id: routing-synthesis
    eval_lane: diagnostic
    tier: architectural
    category: model_routing
    name: "Complex task triggers escalation"
    prompt: "Analyze the themes across my recent Second Brain entries and suggest a content strategy for next week"
    timeout_ms: 90000             # was 45000 — synthesis + tool calls legitimately needs 60-90s
    side_effects: read_only
    validators:
      - type: llm_judge
        rubric: "Does this response demonstrate synthesis and strategic thinking? It should analyze themes, identify patterns, and make concrete content suggestions. A shallow or generic response scores low. A thoughtful, specific analysis scores high."
      - type: length_range
        min: 200
    tags: [routing, synthesis, escalation]

  - id: routing-fallback-graceful
    tier: architectural
    category: model_routing
    name: "Graceful handling of edge request"
    prompt: "What would happen if your primary model went down right now?"
    timeout_ms: 45000
    side_effects: none
    skip_dry_run_prefix: true   # meta-introspection Q, no write intent
    validators:
      - type: llm_judge
        rubric: "Does the response describe Lyra's routing fallback at a concept level? The CORRECT answer is: primary model is MiniMax, if it fails Lyra falls back to Haiku automatically, if both fail Lyra tells the user. Sonnet is on-demand escalation only, not automatic. PASS criteria: mentions primary→secondary→tell-user fallback concept, does NOT mention specific version numbers (M2.7, 4.5, 4.6), does NOT mention router version strings (v14, v16), does NOT describe specific retry timing or cron details. A clean 2-sentence description of the fallback concept is a 5. A response mentioning version numbers or retry intervals scores 1-2 even if otherwise correct."
    tags: [routing, fallback, introspection]
