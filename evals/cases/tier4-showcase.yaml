# Tier 4: Showcase & Regression Tests
# These demonstrate multi-step capability, proactive value, and edge case handling.

tests:
  # --- Multi-Step Tasks ---
  - id: multi-reminder-flow
    tier: showcase
    category: multi_step
    name: "Create reminder with date parsing"
    prompt: "Add a reminder: [eval] call the dentist tomorrow at 3pm"
    timeout_ms: 45000
    side_effects: write
    validators:
      - type: llm_judge
        rubric: "Does the response confirm creating the reminder in Notion with correct details? It should parse 'tomorrow' to a date, include 3pm, and include the task text. Planning without completion is a FAIL."
    cleanup:
      action: notion_delete_matching
      database: "95e1d0de-496f-478e-9fe4-2e2a356c7970"
      title_contains: "[eval]"
    tags: [multi-step, reminder]

  - id: multi-cross-user-task
    tier: showcase
    category: multi_step
    name: "Cross-user task delegation"
    prompt: "Tell Abhigna we need to plan meals for next week, and create a shared reminder titled [eval] meal planning sync."
    timeout_ms: 45000
    side_effects: write
    validators:
      - type: llm_judge
        rubric: "Does the response complete both parts: (1) notify Abhigna and (2) confirm writing the shared [eval] reminder in Notion? Missing either step is a FAIL."
    cleanup:
      action: notion_delete_matching
      database: "95e1d0de-496f-478e-9fe4-2e2a356c7970"
      title_contains: "[eval]"
    tags: [multi-step, cross-user, write]

  - id: multi-insight-capture
    tier: showcase
    category: multi_step
    name: "Classify and save insight"
    prompt: "I just realized that the biggest risk in our product is not competition, it is internal alignment. Teams are optimizing for different metrics and nobody is noticing. Please save this insight with title: [eval] alignment insight."
    timeout_ms: 45000
    side_effects: write
    validators:
      - type: llm_judge
        rubric: "Does the response confirm capturing this as a real insight write in Second Brain? It should classify it (e.g., tags/type) and confirm persistence in Notion, not just discuss it."
    cleanup:
      action: notion_delete_matching
      database: "e4027aaf-d2ff-49e1-babf-7487725e2ef4"
      data_source: "f1ce4e0f-9e0d-43da-87f8-94dae2732962"
      title_properties: ["Name"]
      title_contains: "[eval]"
    tags: [multi-step, second-brain]

  # --- Proactive Quality ---
  - id: proactive-digest-quality
    tier: showcase
    category: proactive_quality
    name: "Morning digest quality"
    prompt: "Generate my morning digest for today. Include news, tasks due, and any important reminders."
    timeout_ms: 45000
    side_effects: read_only
    validators:
      - type: llm_judge
        rubric: "Is this a well-structured morning digest? It should have clear sections (news, tasks, reminders), be actionable (not just informational), be concise (under 400 words), and feel like a briefing from a capable executive assistant. Generic or overly long responses score low."
      - type: length_range
        min: 100
        max: 2500
    tags: [proactive, digest]

  - id: proactive-brain-brief
    tier: showcase
    category: proactive_quality
    name: "Weekly brain brief quality"
    prompt: "Generate my weekly brain brief. Synthesize patterns from the past week across my Second Brain, content ideas, and any recurring themes."
    timeout_ms: 45000
    side_effects: read_only
    validators:
      - type: llm_judge
        rubric: "Does this brain brief demonstrate synthesis? It should identify patterns, connect dots between different entries, and surface non-obvious insights. Simply listing items is a low score. Genuine pattern recognition and strategic suggestions score high."
      - type: length_range
        min: 150
        max: 2800
    tags: [proactive, brain-brief]

  - id: proactive-content-suggestion
    tier: showcase
    category: proactive_quality
    name: "Content suggestion quality"
    prompt: "Based on my recent content ideas, suggest 3 posts I should write this week and explain why each would resonate with my audience."
    timeout_ms: 45000
    side_effects: read_only
    validators:
      - type: llm_judge
        rubric: "Are these content suggestions specific and well-reasoned? Each suggestion should have a clear title/topic, a reason why it would resonate, and connect to the user's actual content ideas (not generic AI blog topics). Three distinct, actionable suggestions score high."
      - type: regex
        pattern: "(1|2|3|first|second|third)"
        flags: "i"
    tags: [proactive, content]

  # --- Edge Cases ---
  - id: edge-empty-message
    tier: showcase
    category: edge_cases
    name: "Handle near-empty message"
    prompt: "."
    timeout_ms: 45000
    side_effects: none
    validators:
      - type: llm_judge
        rubric: "Does the response handle a near-empty/meaningless message gracefully? It should ask what the user needs help with, not crash or return an error. A friendly prompt like 'What can I help with?' scores high."
    tags: [edge, empty]

  - id: edge-long-message
    tier: showcase
    category: edge_cases
    name: "Handle very long message"
    prompt: "I need to plan a complex trip. We are going from Berlin to Tokyo via Dubai, staying 3 nights in Dubai at a hotel near the Marina, then flying to Tokyo for 5 nights where we want to visit Shibuya, Asakusa, Akihabara, and take a day trip to Hakone. Budget is around 5000 euros total for two people including flights but not including food. We need to book the flights by next Friday and the hotels by the end of the month. Also check if our passports need renewal since they expire in September. And remind me to get travel insurance at least 2 weeks before departure. Can you help organize all of this into a structured plan with timeline and checklist?"
    timeout_ms: 45000
    side_effects: none
    validators:
      - type: llm_judge
        rubric: "Does the response handle this complex, multi-part request well? It should break down the trip into structured components (flights, hotels, activities, documents, insurance), create a timeline or checklist, and not miss major elements. Addressing only one part or giving a generic response scores low."
      - type: length_range
        min: 300
    tags: [edge, long-input]
