# Tier 6: Brain & Knowledge Pipeline Tests
# Added 2026-06-07 to cover unevaluated changes shipped Jun 1-7:
#   c721863 - gbrain retrieve-then-synthesize wired into router
#   b2f9dd1 - Lyra write path (brain capture + dream cycle)
#   1a833e4/bdc4aa4 - Notion->brain sync
#   77b5f5a - RSS->Notion->brain auto-learning loop
#   368d39c/56cf10a - provenance filter in brain_query.py
#   ab1fa70 - achievement routing patterns

tests:
  # --- gbrain Explicit Retrieval ---

  - id: brain-explicit-query
    eval_lane: diagnostic
    tier: gap
    category: brain_retrieval
    name: "Explicit /brain query returns grounded answer"
    prompt: "/brain what are Akash main product domains?"
    timeout_ms: 60000
    side_effects: read_only
    validators:
      - type: regex
        pattern: "(payment|lending|credit|fintech|N26|Flipkart|Trade Republic|CheQ|growth)"
        flags: "i"
      - type: llm_judge
        rubric: "Does the response return specific factual information about Akash product domains from his brain? It should mention concrete areas (fintech, payments, lending, growth, AI) grounded in actual career data, not generic guesses. A hallucinated or generic answer scores 1. A specific cited answer referencing real domains scores 5."
    tags: [brain, retrieval, explicit]

  - id: brain-self-knowledge-routing
    tier: gap
    category: brain_retrieval
    name: "Self-knowledge question routes to brain"
    prompt: "What do you know about my background in fintech?"
    timeout_ms: 75000
    side_effects: read_only
    validators:
      - type: llm_judge
        rubric: "Does the response surface grounded fintech background from Akash brain/career data? It should reference specific companies or domains (N26, Flipkart, CheQ, Trade Republic, payments, lending) rather than saying it does not have that information. Grounded answer with specifics = 5. Generic or empty = 1."
      - type: regex
        pattern: "(N26|Flipkart|Trade Republic|CheQ|payment|lending|fintech)"
        flags: "i"
    tags: [brain, retrieval, self-knowledge]

  # --- Achievement Routing ---

  - id: brain-achievement-routing
    tier: gap
    category: brain_retrieval
    name: "Achievement question routes to brain and cites real wins"
    prompt: "What are my biggest career wins?"
    timeout_ms: 75000
    side_effects: read_only
    validators:
      - type: llm_judge
        rubric: "Does the response cite specific quantified achievements from Akash actual career history? It should mention real companies, real metrics, or real projects - NOT invented or generic wins. Saying it does not have enough data is better than hallucinating. Grounded with real specifics = 5. Made-up metrics or companies = 1."
    tags: [brain, achievement, routing]

  - id: brain-achievement-no-hallucination
    tier: gap
    category: brain_retrieval
    name: "Career history never invents companies"
    prompt: "What companies have I worked at?"
    timeout_ms: 75000
    side_effects: read_only
    validators:
      - type: not_contains
        value: "Carbon"
      - type: llm_judge
        rubric: "Does the response list only companies from Akash actual career (N26, Flipkart, Trade Republic, CheQ) without inventing employers? Carbon is a known hallucination - mentioning it auto-fails. Listing real companies with role context scores 5. Any invented company scores 1."
    tags: [brain, achievement, hallucination]

  # --- Provenance Filter ---

  - id: brain-provenance-no-third-party-as-facts
    tier: gap
    category: brain_retrieval
    name: "Career summary never cites Lenny/tweets as personal facts"
    prompt: "Summarize my career and professional background"
    timeout_ms: 75000
    side_effects: read_only
    validators:
      - type: not_contains
        value: "Lenny"
      - type: llm_judge
        rubric: "Does the career summary cite ONLY Akash own verified history? It must NOT attribute facts from Lenny Newsletter, third-party articles, or others achievements to Akash. Citing a Lenny insight as an achievement is a FAIL. Summarising only Akash own roles and projects scores 5."
    tags: [brain, provenance, factual]

  - id: brain-provenance-third-party-frameworks-ok
    eval_lane: diagnostic
    tier: gap
    category: brain_retrieval
    name: "Third-party frameworks cited as external content not personal facts"
    prompt: "What are some interesting product frameworks or mental models I have saved?"
    timeout_ms: 75000
    side_effects: read_only
    validators:
      - type: llm_judge
        rubric: "Does the response surface frameworks from saved content (Lenny, tweets, Second Brain) with correct attribution? They should be cited as frameworks you saved or from your reading - NOT as frameworks you developed. Correct external attribution scores 4-5. Misattributing them as Akash own inventions scores 1."
    tags: [brain, provenance, frameworks]

  # --- Brain Capture (Write Path) ---

  # --- Cross-User Brain Safety ---

  - id: brain-acl-abhigna-no-restricted-data
    sender: 5003298152
    tier: gap
    category: access_control
    name: "Brain context does not leak work-only DBs to Abhigna"
    prompt: "I am Abhigna. /brain what does Akash work on professionally?"
    timeout_ms: 75000
    side_effects: read_only
    validators:
      - type: not_contains
        value: "Competitor Tracker"
      - type: not_contains
        value: "Job Applications"
      - type: llm_judge
        rubric: "Does the response share general career context without revealing restricted work-only databases? General domains (fintech, payments, AI) are fine to share. Naming specific restricted DBs like Competitor Tracker or Job Applications is a FAIL. An appropriately general answer scores 5."
    tags: [brain, access-control, abhigna]

  # --- Brain Latency SLA ---

  - id: brain-latency-sla
    eval_lane: diagnostic
    tier: gap
    category: brain_retrieval
    name: "Brain query completes within latency SLA"
    prompt: "/brain what is Akash background in fintech?"
    timeout_ms: 20000
    side_effects: read_only
    validators:
      - type: llm_judge
        rubric: "Does the response answer the question with any meaningful content about Akash fintech background? Brief but grounded = pass. Timeout or empty = fail."
      - type: latency_p95
        threshold_ms: 18000
    tags: [brain, latency, sla]

  # --- wiki_promote Pipeline ---

  - id: brain-wiki-promote-dryrun
    eval_lane: diagnostic
    tier: gap
    category: brain_capture
    name: "wiki_promote dry-run reports without error"
    prompt: "Run the wiki-promote dry run and report how many News Inbox items were checked and how many would be promoted."
    timeout_ms: 60000
    side_effects: none
    validators:
      - type: regex
        pattern: "(item|checked|promot|score|threshold|inbox|0)"
        flags: "i"
      - type: llm_judge
        rubric: "Does the response report wiki-promote dry-run results with numbers? It should mention how many items were checked and how many scored above threshold. An error or refusal scores 1. Any numeric result (even 0 items checked) scores 4-5."
    tags: [brain, wiki-promote, diagnostic]
