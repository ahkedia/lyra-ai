# Lyra Model Routing Rules
# Maps task categories to models based on patterns, keywords, and complexity signals.
#
# Three tiers:
#   minimax   → MiniMax M2.7 (fast, cheap, 87% of tasks)
#   haiku     → Claude Haiku 4.5 (fallback, moderate complexity)
#   sonnet    → Claude Sonnet 4.6 (synthesis, judgment, strategic)
#
# Router flow:
#   1. Rule-based classifier checks patterns (free, <1ms)
#   2. If confidence < threshold → LLM classifier via Haiku (~$0.001, ~500ms)
#   3. Selected model handles the task

version: 1
default_model: minimax
confidence_threshold: 0.7

# --- TIER 0: Python CRUD bypass (0 tokens, ~100ms) ---
# These operations are executed directly via lyra-ai/crud/cli.py.
# No model is invoked. Patterns are regex-matched before any routing.
# To add a new operation: add pattern here AND implement in crud/cli.py.
tier0_python_jobs:
  description: "Pure CRUD — deterministic, no reasoning needed. Python script handles end-to-end."
  script: "/root/lyra-ai/crud/cli.py"
  operations:
    list_reminders:
      patterns:
        # Aligned with crud/parse.py: optional "current", no end anchor; normalize strips "just list briefly"
        - "^(list|show|what('s| is| are)(?: in| on)?)\\s+(?:my|the)\\s+(?:current\\s+)?(?:reminders?|tasks?)\\b"
        - "^(?:show|list)(?:\\s+me)?(?:\\s+my)?\\s+(?:current\\s+)?(?:reminders?|tasks?)\\b"
      command: "notion list-reminders"
      examples:
        - "List my reminders"
        - "Show my tasks"
        - "What's in my reminders?"
        - "What are my current reminders? Just list them briefly."
    list_meals:
      patterns:
        - "^(?:what'?s?|show|list)(?: in| on)?(?: my)?(?: the)? meal (?:plan|planning)$"
        - "^(?:show|list) (?:me )?(?:my )?meals?$"
      command: "notion list-db meals"
      examples:
        - "What's in my meal plan?"
        - "Show my meals"
    list_trips:
      patterns:
        - "^(?:what'?s?|show|list)(?: my)?(?: upcoming)? trips?$"
      command: "notion list-db trips"
      examples:
        - "Show my upcoming trips"
        - "List trips"
    add_reminder:
      patterns:
        - "^remind me (?:to |about )?(.+)"
        - "^set (?:a )?reminder (?:to |for |about )?(.+)"
        - "^add (?:a )?reminder(?:\\s*:\\s*|\\s+to\\s+|\\s+for\\s+|\\s+about\\s+|\\s+)(.+)"
        - "^create (?:a )?reminder(?:\\s*:\\s*|\\s+to\\s+|\\s+for\\s+|\\s+about\\s+|\\s+)(.+)"
      command: "notion add-reminder"
      examples:
        - "Remind me to call the dentist tomorrow"
        - "Set a reminder for the dentist on Friday"
        - "Add a reminder: pick up dry cleaning"
        - "Create a reminder to renew insurance by Monday"
    add_item:
      patterns:
        - "^add (.+?) to (?:(?:my |the )?(?:shopping|grocery|groceries|meal|task|todo|trip|content|idea)s? (?:list|plan)?|(?:my )?reminders?)$"
      command: "notion add-item"
      examples:
        - "Add milk to shopping list"
        - "Add yoga to my tasks"
    mark_done:
      patterns:
        - "^mark (.+?) (?:as )?(?:done|complete|finished)$"
        - "^(?:done|complete|finished)[:\\s]+(.+)$"
      command: "notion mark-done"
      examples:
        - "Mark dentist call done"
        - "Mark the visa task as complete"

    # Personal Wiki (crud/wiki_notion.py) — same entrypoint as health: `cli.py parse "<msg>"`
    wiki_lenny_search:
      description: "Query Personal Wiki (Type=Lenny Synthesis) by title; return excerpts."
      command: "parse (try_tier0_wiki_text → lenny_wiki_search)"
      patterns:
        - "(?i)what (does|did) lenny say (about )?.+"
        - "(?i)lenny (wiki )?(on|about) .+"
        - "(?i)lenny says (about )?.+"
        - "(?i)wiki lenny[:\\s].+"
      examples:
        - "What does Lenny say about pricing?"
        - "Lenny on activation metrics"
    wiki_lint:
      description: "Orphan / stale / missing My take scan (excludes Inbox; Lenny Synthesis not flagged for 'My take')."
      command: "parse (try_tier0_wiki_text → wiki_lint_report)"
      patterns:
        - "(?i)(run |monthly )?wiki[- ]?lint"
        - "(?i)lint (my )?personal wiki"
        - "(?i)wiki health( check)?"
        - "(?i)personal wiki lint"
      examples:
        - "Run wiki-lint"
        - "wiki health check"
    wiki_dedup:
      description: "List existing wiki pages with overlapping titles (skip Inbox) before creating a new page."
      command: "parse (try_tier0_wiki_text → wiki_dedup_suggest)"
      patterns:
        - "(?i)wiki[- ]?dedup( for| on)?[: ].+"
        - "(?i)deduplicate wiki[: ].+"
        - "(?i)existing wiki pages? (for|on|about).+"
      examples:
        - "wiki dedup for product analytics"
    news_inbox_rss:
      description: "Ingest latest arXiv CS.LG into News Inbox; skip if Link already exists."
      command: "news-inbox-rss [max_new]"
      patterns: []  # cron/CLI; not in natural-language parse
      examples:
        - "python3 /root/lyra-ai/crud/cli.py news-inbox-rss 15"

    job_application:
      description: >
        Two-phase job application pipeline. Phase A detects a job link/company/person and
        returns clarification questions. Phase B (reply '1','2','3','both', etc.) launches
        a background Python process that: fetches job context via Tavily, fetches all
        Personal Wiki pages (career + domain knowledge) from Notion, calls Sonnet to generate
        a cover letter and/or outreach message, saves both as Gmail drafts via himalaya,
        and upserts a row in Recruiter Tracker.
      script: "/root/lyra-ai/crud/cli.py + /root/lyra-ai/crud/job_application.py"
      patterns:
        - "apply to|job link|job post|job opening|job at|cover letter for|draft.*outreach|linkedin.com/jobs|write.*cover letter"
        - "draft|write|creating.*message (to|for)|outreach (message )?(to|for)|gmail draft|message (to|for) [Name]|help.*message"
        - "^[1-3]$|^both$|^outreach( only)?$|^cover( letter)?( only)?$|^message( only)?$"
      examples:
        - "Apply to this: https://linkedin.com/jobs/xyz — company is Stripe"
        - "Write a cover letter for the PM role at Revolut: [url]"
        - "Draft an outreach message to Sarah Chen at N26 (sarah@n26.com)"
        - "Message for Rajneesh — we worked together at Flipkart on credit; help me sound like me"
        - "3 more formal"  # Phase B reply: both, more formal tone
      state: "/tmp/lyra-job-state.json (30-min TTL)"
      background_log: "/tmp/lyra-job-pipeline.log"
      models_used: "Sonnet 4.6 (for cover letter + outreach generation)"
      integrations: "Tavily (job/company research), Notion (wiki pages), himalaya (Gmail drafts)"

    content_draft:
      description: >
        Single Sonnet path for X / outreach / generic drafts and revisions. Pulls Voice Canon +
        Personal Wiki from Notion (same bundle as job pipeline) plus FORMAT_PLAYBOOK / NEGATIVE_STYLE
        excerpts for channel rules. Tier 0 via `cli.py parse` — not token-free (Sonnet), but
        deterministic routing from explicit prefixes.
      script: "/root/lyra-ai/crud/cli.py parse + /root/lyra-ai/crud/content_draft.py"
      patterns:
        - "^(?:lyra )?content draft (x|outreach|generic)"
        - "^(?:lyra )?content revise (x|outreach|generic)"
      telegram_examples:
        - "content draft x: why operator UX still matters in 2026"
        - "lyra content draft outreach: 3-line hook for a Series B PM intro"
        - "content revise x\nPRIOR:\n(old draft)\nFEEDBACK:\n(shorter, less jargon)"
      cli_examples:
        - "python3 /root/lyra-ai/crud/cli.py content-draft draft x \"topic\""
        - "python3 /root/lyra-ai/crud/cli.py content-draft revise x --prior \"...\" --feedback \"...\""
      models_used: "Claude Sonnet 4.6"
      integrations: "Notion (Personal Wiki), voice-system markdown (FORMAT_PLAYBOOK, NEGATIVE_STYLE)"

# RULE: When adding new CRUD operations to Lyra, always ask:
#   1. Is this deterministic given the input? → add to tier0_python_jobs
#   2. Does it need NL understanding/reasoning? → add to tier1 (minimax) or higher
#
# Health logging (Lyra Health Coach — four Notion DBs on the coach page):
#   Implemented in plugins/lyra-model-router/index.js as HEALTH_TIER0_PATTERNS + same
#   script path: `python3 /root/lyra-ai/crud/cli.py parse "<message>"`.
#   Keep patterns aligned with crud/cli.py cmd_parse() health regexes.
#
# Personal Wiki Tier 0: WIKI_TIER0_PATTERNS in plugins/lyra-model-router/index.js — must stay
# aligned with crud/wiki_notion.try_tier0_wiki_text. News Inbox RSS: crud/news_inbox_rss.py (CLI: news-inbox-rss).

# --- TIER 1: MiniMax (simple, single-action) ---
tiers:
  minimax:
    description: "Fast, single-action commands. No reasoning required."
    model: "minimax/MiniMax-M2.7"
    max_tokens: 2048
    categories:
      notion_write:
        patterns:
          - "add .+ to .+ (list|database|db)"
          - "create .+ (reminder|task|entry|item)"
          - "mark .+ (done|complete|finished)"
          - "update .+ (status|checkbox|field)"
          - "set .+ to .+"
        keywords: ["add", "create", "mark done", "check off", "update status", "set"]
        examples:
          - "Add milk to the shopping list"
          - "Create a reminder to call the dentist by Friday"
          - "Mark the electrician task as done"

      notion_read:
        patterns:
          - "what('s| is| are) (in |on )?(my |the )?.+"
          - "show (me )?(my |the )?.+"
          - "list (my |the |all )?.+"
          - "how many .+"
          - "check .+ (database|db|list)"
        keywords: ["show", "list", "what's", "check", "how many", "query", "look up", "find"]
        examples:
          - "What's on my shopping list?"
          - "Show me today's tasks"
          - "How many content ideas do I have?"

      reminders:
        patterns:
          - "remind (me|abhigna|us) .+"
          - "set (a )?reminder .+"
          - "don't forget .+"
          - "tell (abhigna|akash) .+"
        keywords: ["remind", "reminder", "don't forget", "tell abhigna", "tell akash"]
        examples:
          - "Remind me to renew insurance by Monday"
          - "Tell Abhigna to pick up the prescription"

      weather:
        patterns:
          - "(what's |how's |)the weather .+"
          - "weather (in|for|at) .+"
          - "will it rain .+"
          - "temperature .+"
        keywords: ["weather", "rain", "temperature", "forecast", "sunny", "cloudy"]
        examples:
          - "What's the weather in Berlin?"
          - "Will it rain tomorrow?"

      calendar_read:
        patterns:
          - "what('s| is| are) (on |in )?(my |the )?(calendar|schedule|agenda)"
          - "(any |what )?(meetings?|events?|calls?) (today|tomorrow|this week)"
          - "when (is|does) (my |the )?(next |upcoming )?(meeting|event|call)"
          - "am I free .+"
          - "what do I have .+(today|tomorrow|this week)"
        keywords: ["calendar", "schedule", "meetings today", "agenda", "next meeting", "what's on my calendar", "am I free"]
        examples:
          - "What's on my calendar today?"
          - "Any meetings tomorrow?"
          - "When is my next call?"

      quick_lookup:
        patterns:
          - "what time .+"
          - "when (is|does|did) .+"
          - "who (is|was) .+"
          - "how (do|does|did) .+"
        keywords: ["what time", "when is", "who is"]
        examples:
          - "What time does the morning digest run?"
          - "When is the next competitor review?"

      short_reply:
        patterns:
          - "^(yes|no|ok|thanks|done|got it|sure|good|great|cool|perfect)$"
          - "^.{1,30}$"
        keywords: ["yes", "no", "ok", "thanks", "done", "got it"]
        examples:
          - "Thanks!"
          - "Yes, send it"
          - "Done"

      cron_management:
        patterns:
          - "(add|remove|list|show|change|update) .* cron .+"
          - "schedule .+ (at|every|daily|weekly) .+"
        keywords: ["cron", "schedule", "heartbeat"]
        examples:
          - "List my cron jobs"
          - "Add a cron to check news at 3pm"

      self_edit:
        patterns:
          - "(edit|update|change|modify) .*(SOUL|MEMORY|skill|config)"
          - "add .+ to .*(SOUL|MEMORY|skill)"
        keywords: ["edit SOUL", "update MEMORY", "modify skill", "self-edit"]
        examples:
          - "Add a new rule to SOUL.md"
          - "Update your memory about my timezone"

      health_logging:
        patterns:
          - "weight[: ]+[0-9]"
          - "slept? [0-9]"
          - "sleep[: ]+[0-9]"
          - "walked [0-9]+ steps"
          - "steps[: ]+[0-9]"
          - "workout[: ]+"
          - "ran [0-9]+ min"
          - "cycled [0-9]+ min"
          - "ate .+ for (breakfast|lunch|dinner|snack)"
          - "had .+ for (breakfast|lunch|dinner|snack)"
          - "resting h"
          - "heart rate"
          - "energy level"
          - "body fat"
          - "monthly check"
        keywords: ["weight:", "slept", "steps", "workout:", "ran ", "cycled", "calories burned", "resting hr"]
        examples:
          - "weight: 91.5"
          - "slept 7.5 hours"
          - "workout: run 30"
          - "ate dal rice for lunch"
          - "resting HR: 62"
        skill: "health-coach"

  # --- TIER 2: Haiku (moderate complexity, some reasoning) ---
  haiku:
    description: "Moderate tasks needing some reasoning, multi-step coordination, or nuance."
    model: "anthropic/claude-haiku-4-5"
    max_tokens: 4096
    categories:
      email_read:
        patterns:
          - "(read|check|show|summarize) .*(email|inbox|mail|gmail)"
          - "any .*(new |unread )?(email|mail)"
          - "what .*(email|mail) .+"
        keywords: ["email", "inbox", "unread", "gmail", "mail"]
        examples:
          - "Check my email for anything urgent"
          - "Summarize my unread emails"

      email_draft:
        patterns:
          - "(draft|write|compose|reply to) .*(email|mail|message to|reply)"
          - "(draft|write) (a |an |the )?(email|mail|reply|response)"
          - "(draft|write) .*(reply|response) .*(to|about|regarding)"
          - "send .*(email|mail) .+"
          - "reply to .*(recruiter|manager|team|colleague)"
        keywords: ["draft email", "write email", "write an email", "compose", "reply to email", "send email", "draft a reply", "reply to the", "declining"]
        examples:
          - "Draft a reply to the recruiter about the timeline"
          - "Write an email declining the meeting"

      calendar_write:
        patterns:
          - "(schedule|book|create|add|block) .*(meeting|event|call|time|slot|calendar)"
          - "(block|reserve) .*(time|hour|slot) .+"
          - "(move|reschedule|cancel|delete) .*(meeting|event|call)"
          - "put .+ on .*(calendar|schedule)"
        keywords: ["schedule meeting", "book", "block time", "create event", "add to calendar", "reschedule", "cancel meeting"]
        examples:
          - "Schedule a meeting with the team at 3pm"
          - "Block 2 hours for deep work tomorrow morning"
          - "Cancel my 4pm call"

      web_search:
        patterns:
          - "(search|look up|find|google|research) .+"
          - "what (is|are|was|were) .+ (latest|recent|new|current)"
        keywords: ["search", "look up", "research", "latest", "find out"]
        examples:
          - "Search for the latest ECB digital euro updates"
          - "Look up Revolut's latest product launch"

      multi_step:
        patterns:
          - ".+,\\s*(then|and then|also|plus|after that) .+"
          - ".+(then|and also|and then) .+(and|then|also) .+"
        keywords: ["and then", "after that", "step 1", "first then", ", then ", ", also "]
        signals:
          conjunction_count: ">= 2"
          sentence_count: ">= 3"
        examples:
          - "Add milk to the list, then remind Abhigna to buy it tomorrow, and also check if we have eggs"
          - "Check my calendar, draft a reply to the recruiter, and add it to my content ideas"

      cross_user_coordination:
        patterns:
          - "(assign|delegate|tell|ask) (abhigna|akash) to .+"
          - "(assign|delegate) .+ to (abhigna|akash)"
          - ".+ for (abhigna|akash) .+"
        keywords: ["assign to", "delegate to", "tell abhigna", "ask akash", "to abhigna", "to akash", "assign the"]
        examples:
          - "Assign the grocery shopping to Abhigna for this weekend"

      data_formatting:
        patterns:
          - "(format|organize|structure|table|csv|export) .+"
          - "give me .+ as (a )?(table|list|csv|summary)"
        keywords: ["format", "table", "csv", "export", "organize"]
        examples:
          - "Show my tasks as a table with deadlines"
          - "Export my content ideas as a CSV"

  # --- TIER 3: Sonnet (synthesis, strategic, complex reasoning) ---
  sonnet:
    description: "Complex tasks requiring synthesis across multiple sources, strategic thinking, or nuanced judgment."
    model: "anthropic/claude-sonnet-4-6"
    max_tokens: 8192
    categories:
      synthesis:
        patterns:
          - "(synthesize|synthesise|summarize|summarise|digest|brief|review) .*(week|month|pattern|across|multiple)"
          - "(summarize|summarise) (my |the |this )?(week|month|quarter)"
          - "what .*(pattern|theme|trend|insight)"
          - "(connect|combine|aggregate) .+"
          - "what (decision|idea|pattern).*(capture|make|see|notice)"
        keywords: ["synthesize", "summarize my week", "digest", "weekly review", "patterns", "trends", "insights", "brief me", "aggregate", "what patterns"]
        examples:
          - "Summarize my week — what decisions did I make, what ideas did I capture?"
          - "What patterns do you see across my content ideas this month?"
          - "Give me a weekly brain brief"

      strategic_analysis:
        patterns:
          - "(analyze|analyse|compare|evaluate|assess|review) .*(strategy|approach|option|competitor|market|theme|second brain)"
          - "(compare|contrast) .*(revolut|monzo|bunq|starling|n26|competitor)"
          - "should I .+"
          - "what should .*(my |I |the )?(priorit|focus|next)"
          - "what('s| is) the best (way|approach|strategy) .+"
          - "pros and cons .+"
          - "trade.?off .+"
          - "what .*(career|job|move) .*(make|sense|best)"
        keywords: ["analyze", "strategy", "compare", "evaluate", "should I", "pros and cons", "trade-off", "recommendation", "priorities", "what should my"]
        examples:
          - "Analyze Revolut vs Monzo's approach to crypto in Q1"
          - "Should I focus on LinkedIn or Twitter for my content strategy?"
          - "What are the trade-offs between staying in Berlin vs relocating to the US?"

      complex_drafting:
        patterns:
          - "(draft|write|compose) .*(blog|article|post|essay|proposal|pitch|strategy)"
          - "(draft|write) .*(long|detailed|comprehensive|thoughtful) .+"
        keywords: ["blog post", "article", "essay", "proposal", "pitch", "long-form", "thought piece", "strategy doc"]
        examples:
          - "Draft a blog post about my experience building a personal AI"
          - "Write a proposal for the new product feature"

      competitive_intelligence:
        patterns:
          - "(competitor|competitive|market) .*(analysis|review|update|digest|landscape)"
          - "(what is|how is|compare) .*(revolut|monzo|bunq|starling|n26) .+"
          - "compare .*(revolut|monzo|bunq|starling|n26)"
          - "(revolut|monzo|bunq|starling|n26) .*(launch|feature|update|release|what it means)"
        keywords: ["competitor analysis", "market landscape", "competitive review", "compare revolut", "compare monzo", "feature launches"]
        examples:
          - "Give me a competitive digest for this week"
          - "Compare Revolut and Monzo's latest feature launches"

      planning:
        patterns:
          - "(plan|roadmap|timeline|breakdown|prioritize|prioritise) .+"
          - "help me (think through|plan|structure|organize|figure out) .+"
          - "what .*(priority|priorities|focus|next) .+"
        keywords: ["plan", "roadmap", "prioritize", "think through", "help me decide", "figure out"]
        examples:
          - "Help me plan the next quarter's content strategy"
          - "What should my priorities be this week given everything on my plate?"

      multi_source_reasoning:
        patterns:
          - ".*(based on|considering|given|taking into account) .*(multiple|several|all|various|different) .+"
          - ".*(based on|considering) my .*(tracking|ideas|content|brain|notes).*(and|,) .+"
          - ".*(cross.?reference|correlate|combine) .+"
        keywords: ["based on multiple", "based on my", "cross-reference", "considering all", "taking into account", "competitor tracking and"]
        examples:
          - "Based on my competitor tracking, content ideas, and recruiter conversations — what career move makes the most sense?"

# --- Ambiguity signals ---
# If none of the above match with high confidence, these signals help the LLM classifier
ambiguity_signals:
  escalate_to_haiku:
    - message_length: "> 200 characters"
    - question_marks: ">= 2"
    - conditional_language: ["if", "unless", "depending", "it depends"]
  escalate_to_sonnet:
    - message_length: "> 500 characters"
    - multiple_domains: true  # mentions work + personal + content etc.
    - temporal_scope: ["this week", "this month", "this quarter", "over time", "lately"]
    - meta_reasoning: ["what do you think", "help me decide", "what should I"]

# --- Override rules ---
# These override any classification when matched
overrides:
  always_minimax:
    - "^(hi|hello|hey|good morning|good evening|gm|thanks|thank you|ok|done|yes|no|sure|got it|👍|🙏)$"
  always_sonnet:
    - "^(give me |run |do )?(the |my |a )?(morning digest|weekly review|brain brief|competitor digest|content reminder)$"
    - "^weekly review$"
    - "^brain brief$"
    - "^morning digest$"
    - "^competitor digest$"
  never_minimax:
    - "draft .*(blog|article|proposal)"
    - "analyze .*(competitor|market|strategy)"
    - "synthesize .*(week|month)"
    - "summarize .*(my |the )?(week|month|quarter)"
    - "what pattern"
